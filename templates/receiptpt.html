<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الفاتورة</title>

  <style>
    body {
      font-family: Helvetica;
      text-align: center;
      margin-top: 40px;
    }

    h1 {
      color: #ff0206;
      font-size: 36px;
      margin-bottom: 20px;
    }

    table {
      width: 80%;
      margin: 0 auto 30px auto;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      font-size: 18px;
    }

    th {
      background-color: #f8f860;
    }

    input {
      width: 90%;
      padding: 8px;
      font-size: 16px;
      margin: 4px 0;
    }

    .btn {
      background-color: #f8f860;
      border: none;
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>الفاتورة</h1>

<table>
  <tr>
    <th>الاسم</th>
    <th>الطلب</th>
    <th>الكمية</th>
  </tr>
  <tr>
    <td><input type="text" placeholder="اكتب اسمك"></td>
    <td><input type="text" placeholder="اكتب الطلب"></td>
    <td><input type="number" placeholder="الكمية"></td>
  </tr>
</table>

<!-- زر لتأكيد الطلب -->
<button class="btn" onclick="alert('تم تأكيد الطلب!')">تأكيد الطلب</button>

<!-- زر طلب جديد -->
<a href="/"><button class="btn">طلب جديد</button></a>

</body>
</html>
